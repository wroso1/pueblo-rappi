<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repartidor - Pueblo Fast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .order-card { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen bg-gray-50">
    <header class="bg-black text-white p-5 sticky top-0 z-10 flex justify-between items-center">
        <h1 class="text-xl font-black italic tracking-tighter">Driver<span class="text-yellow-400">Mode</span></h1>
        <div class="flex items-center gap-2 bg-white/10 px-3 py-1 rounded-full text-xs font-bold">
            <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span> En Línea
        </div>
    </header>

    <main class="p-4">
        <div class="mb-6">
            <h2 class="text-2xl font-bold text-gray-800 mb-1">Pedidos Disponibles</h2>
            <p class="text-gray-500 text-sm">Toca el botón para tomar el pedido</p>
        </div>

        <div id="orders-container" class="flex flex-col gap-4">
            <!-- Orders flow here -->
            <div class="text-center py-20 text-gray-400">
                <i class="fa-solid fa-spinner fa-spin text-3xl mb-4"></i>
                <p>Sincronizando con la nube...</p>
            </div>
        </div}
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA-EXAMPLE-key",
            authDomain: "demo-pueblo.firebaseapp.com",
            projectId: "demo-pueblo",
            storageBucket: "demo-pueblo.appspot.com",
            messagingSenderId: "000000000",
            appId: "1:000000:web:demo"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const container = document.getElementById('orders-container');

        function renderOrders(orders) {
            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-20 text-gray-400">
                        <i class="fa-solid fa-umbrella text-5xl mb-4"></i>
                        <p>No hay pedidos pendientes.<br>¡Descansa un poco!</p>
                    </div}
                `;
                return;
            }

            container.innerHTML = '';
            orders.forEach(order => {
                const card = document.createElement('div');
                card.className = 'order-card bg-white p-6 rounded-3xl shadow-sm border-l-8 border-yellow-400 flex flex-col gap-4';
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="flex gap-4 items-center">
                            <div class="bg-gray-100 p-3 rounded-2xl text-2xl">📦</div>
                            <div>
                                <div class="font-black text-lg text-gray-800">${order.producto}</div>
                                <div class="text-sm text-gray-500 font-medium">
                                    <i class="fa-solid fa-location-dot text-red-500 mr-1"></i> ${order.direccion}
                                </div>
                            </div>
                        </div}
                        <div class="text-xl font-black text-gray-800">$${order.precio?.toLocaleString() || 0}</div>
                    </div>
                    <button 
                        data-id="${order.id}" 
                        class="btn-accept bg-black text-white py-4 rounded-2xl font-black tracking-wide shadow-lg active:scale-95 transition-all"
                    >
                        TOMAR PEDIDO
                    </button>
                `;
                
                card.querySelector('.btn-accept').onclick = () => acceptOrder(order.id);
                container.appendChild(card);
            });
        }

        async function acceptOrder(id) {
            const btn = document.querySelector(`[data-id="${id}"] .btn-accept`);
            btn.disabled = true;
            btn.innerText = 'CONFIRMANDO...';
            
            try {
                const orderRef = doc(db, "pedidos", id);
                await updateDoc(orderRef, {
                    estado: "ACEPTADO",
                    timestamp_aceptado: new Date()
                });
                // El onSnapshot se encarga de eliminar la tarjeta automáticamente
            } catch (e) {
                console.error(e);
                alert('Error al aceptar pedido. Verifica tu conexión.');
                btn.disabled = false;
                btn.innerText = 'TOMAR PEDIDO';
            }
        }

        // Listener en tiempo real: Solo pedidos PENDIENTES
        const q = query(collection(db, "pedidos"), where("estado", "==", "PENDIENTE"));
        onSnapshot(q, (snapshot) => {
            const orders = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            // Ordenar por timestamp (el más viejo primero)
            orders.sort((a, b) => (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0));
            renderOrders(orders);
        });
    </script>
</body>
</html>
